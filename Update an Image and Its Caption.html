<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Exercise 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="p-10">

    <img
      id="photo"
      src="https://picsum.photos/seed/old/300/200"
      alt="Old image"
      class="rounded-xl shadow mb-3"
    />

    <p id="caption" class="text-gray-500 text-sm">This is the old image</p>

    <script>
      const photo = document.getElementById('photo');
      photo.src = "https://picsum.photos/seed/new/300/200";
      photo.alt = "New image";
      const caption = document.getElementById('caption');
      caption.textContent = "This is the new image";
    </script>

  </body>
</html>
